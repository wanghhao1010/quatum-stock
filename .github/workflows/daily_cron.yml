name: 🕒 AI 量子雷達收盤自動餵食排程

on:
  schedule:
    # 國際標準時間 UTC 06:10 = 台北時間下午 14:10 (台股剛收盤)
    - cron: '10 6 * * 1-5'
    # 國際標準時間 UTC 21:10 = 台北時間隔天清晨 05:10 (美股剛收盤)
    - cron: '10 21 * * 1-5'
  workflow_dispatch: 

jobs:
  brain-feeding:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 複製 GitHub 倉庫程式碼
      uses: actions/checkout@v3

    - name: 🐍 配置 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 📦 安裝量化解算套件
      run: |
        pip install yfinance pandas numpy supabase

    - name: 🚀 啟動自動化解算並安全灌入 Supabase
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        python auto_daily_fetch.py